# Auto-publish @capitalthought/npm-helper-mcp on v* tag push.
#
# Release flow:
#   cd mcp-server
#   npm version patch        # bumps package.json, creates commit + tag
#   cd ..
#   git push --follow-tags   # this workflow fires on the v* tag
#
# The workflow rebuilds and publishes. NPM_TOKEN is a granular
# @capitalthought-scope token with bypass-2fa enabled.

name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (no actual publish)'
        default: 'false'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        working-directory: mcp-server
        run: npm ci

      - name: Build
        working-directory: mcp-server
        run: npm run build

      - name: Test
        working-directory: mcp-server
        run: npm test

      - name: Verify tag matches package.json version
        working-directory: mcp-server
        run: |
          TAG="${GITHUB_REF##*/}"
          PKG_VER="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VER" ]; then
            echo "tag $TAG does not match package.json version $PKG_VER"
            exit 1
          fi

      - name: Publish
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: mcp-server
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        working-directory: mcp-server
        run: npm publish --dry-run --access public
